server {
    listen 127.0.0.1:8080;

    root ./www;
    index index.html about.html;

    client_max_body_size 5000;

    location / {
        root ./www;
        allowed_methods GET POST;
        index files/doc.txt;
        autoindex off;
    }

    location /files/ {
        allowed_methods GET;
        root ./www/files;
        autoindex off;
    }

    location /cgi/ {
        allowed_methods GET;
        root ./www/cgi;
        cgi_extension .py;
        cgi_pass /usr/bin/python3;
    }

    location /cgi-sh/ {
        allowed_methods GET;
        root ./www/cgi;
        cgi_extension .sh;
        cgi_pass /bin/bash;
    }
}