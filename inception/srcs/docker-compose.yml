services:
  nginx:
    build: requirements/nginx
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    restart: unless-stopped

  wordpress:
    build: requirements/wordpress
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    env_file: .env
    secrets:
      - db_password
      - credentials
    restart: unless-stopped

  mariadb:
    build: requirements/mariadb
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    restart: unless-stopped

volumes:
  wp_data:
    driver: local
  db_data:
    driver: local

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
